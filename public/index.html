<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chatbot</title>
    <style>
        :root {
            --primary: #0061ff;
            --primary-hover: #0052d9;
            --bg: #f8fafc;
            --chat-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --user-msg: #0061ff;
            --ai-msg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        h1 { font-size: 1.1rem; font-weight: 600; }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .assistant {
            align-self: flex-start;
            background: var(--ai-msg);
            color: var(--text);
            border-bottom-left-radius: 2px;
        }

        .loading-msg {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 4px;
            display: none;
        }

        .input-container {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 9999px;
            outline: none;
            transition: border-color 0.2s;
            font-size: 0.95rem;
        }

        input:focus { border-color: var(--primary); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: var(--primary-hover); transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        button:disabled { background: var(--border); cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <div class="status-dot"></div>
            <h1>Llama 3.3 Context-Aware Agent</h1>
        </header>

        <div id="chat-window">
            <div class="message assistant">Hello! I'm your Cloudflare-powered AI Agent. How can I help you today?</div>
        </div>

        <div id="loading-indicator" class="loading-msg" style="padding: 0 1.5rem 0.5rem 1.5rem;">Agent is thinking...</div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Ask your agent anything..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://cf-ai-chatbot.kaushik-sp2002.workers.dev/api/chat';
        const sessionId = localStorage.getItem('chat_session_id') || crypto.randomUUID();
        localStorage.setItem('chat_session_id', sessionId);

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading-indicator');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = '';
            addMessage('user', message);
            
            sendBtn.disabled = true;
            loading.style.display = 'block';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, message })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                addMessage('assistant', data.response);
            } catch (err) {
                console.error(err);
                addMessage('assistant', '⚠️ Error: ' + err.message);
            } finally {
                sendBtn.disabled = false;
                loading.style.display = 'none';
                userInput.focus();
            }
        }

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
